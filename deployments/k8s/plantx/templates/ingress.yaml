{{- if .Values.orderService.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "plantx.fullname" . }}-order
  labels:
    {{- include "plantx.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: {{ .Values.orderService.ingress.className }}
  rules:
    - host: {{ .Values.orderService.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "plantx.fullname" . }}-order
                port:
                  number: {{ .Values.orderService.service.httpPort }}
{{- end }}
