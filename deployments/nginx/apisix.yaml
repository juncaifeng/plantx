routes:
  - uri: /api/*
    upstream:
      nodes:
        "order-service:8081": 1
      type: roundrobin
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/(.*)", "/$1"]
  - uri: /auth/*
    upstream:
      nodes:
        "maxkey:8080": 1
      type: roundrobin
    plugins:
      proxy-rewrite:
        regex_uri: ["^/auth/(.*)", "/$1"]
#end
