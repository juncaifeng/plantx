run:
  timeout: 5m

linters:
  enable:
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell

linters-settings:
  staticcheck:
    checks: ["all", "-SA1019"]

issues:
  exclude-use-default: false
  exclude-dirs:
    - gen
    - vendor
    - api
    - sqlc
