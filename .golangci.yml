run:
  timeout: 5m

linters:
  enable:
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
  disable:
    - errcheck
    - revive

linters-settings:
  staticcheck:
    checks: ["all", "-SA1019"]

issues:
  exclude-use-default: false
  exclude-dirs:
    - gen
    - vendor
  exclude-files:
    - '.*\.pb\.go$'
    - '.*\.pb\.gw\.go$'
    - '.*\.grpc\.pb\.go$'
    - '.*\.sql\.go$'
