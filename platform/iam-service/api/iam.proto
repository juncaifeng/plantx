syntax = "proto3";

package plantx.iam.v1;

option go_package = "github.com/plantx/platform/iam-service/api";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "plantx/kit/authz.proto";

service IAMService {
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {
      get: "/api/iam/v1/users"
    };
    option (plantx.kit.authz.action) = {
      service: "iam"
      resource: "user"
      operation: "list"
    };
  }

  rpc CreateUser(CreateUserRequest) returns (User) {
    option (google.api.http) = {
      post: "/api/iam/v1/users"
      body: "*"
    };
    option (plantx.kit.authz.action) = {
      service: "iam"
      resource: "user"
      operation: "create"
    };
  }

  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse) {
    option (google.api.http) = {
      get: "/api/iam/v1/roles"
    };
    option (plantx.kit.authz.action) = {
      service: "iam"
      resource: "role"
      operation: "list"
    };
  }

  rpc GetRole(GetRoleRequest) returns (Role) {
    option (google.api.http) = {
      get: "/api/iam/v1/roles/{id}"
    };
    option (plantx.kit.authz.action) = {
      service: "iam"
      resource: "role"
      operation: "read"
    };
  }

  rpc CreateRole(CreateRoleRequest) returns (Role) {
    option (google.api.http) = {
      post: "/api/iam/v1/roles"
      body: "*"
    };
    option (plantx.kit.authz.action) = {
      service: "iam"
      resource: "role"
      operation: "create"
    };
  }

  rpc UpdateRole(UpdateRoleRequest) returns (Role) {
    option (google.api.http) = {
      put: "/api/iam/v1/roles/{id}"
      body: "*"
    };
    option (plantx.kit.authz.action) = {
      service: "iam"
      resource: "role"
      operation: "update"
    };
  }

  rpc DeleteRole(DeleteRoleRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/iam/v1/roles/{id}"
    };
    option (plantx.kit.authz.action) = {
      service: "iam"
      resource: "role"
      operation: "delete"
    };
  }

  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse) {
    option (google.api.http) = {
      get: "/api/iam/v1/permissions"
    };
    option (plantx.kit.authz.action) = {
      service: "iam"
      resource: "permission"
      operation: "list"
    };
  }

  rpc CreatePermission(CreatePermissionRequest) returns (Permission) {
    option (google.api.http) = {
      post: "/api/iam/v1/permissions"
      body: "*"
    };
    option (plantx.kit.authz.action) = {
      service: "iam"
      resource: "permission"
      operation: "create"
    };
  }

  rpc DeletePermission(DeletePermissionRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/iam/v1/permissions/{id}"
    };
    option (plantx.kit.authz.action) = {
      service: "iam"
      resource: "permission"
      operation: "delete"
    };
  }

  rpc ListAttributes(ListAttributesRequest) returns (ListAttributesResponse) {
    option (google.api.http) = { get: "/api/iam/v1/attributes" };
    option (plantx.kit.authz.action) = { service: "iam" resource: "attribute" operation: "list" };
  }
  rpc CreateAttribute(CreateAttributeRequest) returns (Attribute) {
    option (google.api.http) = { post: "/api/iam/v1/attributes" body: "*" };
    option (plantx.kit.authz.action) = { service: "iam" resource: "attribute" operation: "create" };
  }
  rpc UpdateAttribute(UpdateAttributeRequest) returns (Attribute) {
    option (google.api.http) = { put: "/api/iam/v1/attributes/{id}" body: "*" };
    option (plantx.kit.authz.action) = { service: "iam" resource: "attribute" operation: "update" };
  }
  rpc DeleteAttribute(DeleteAttributeRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/api/iam/v1/attributes/{id}" };
    option (plantx.kit.authz.action) = { service: "iam" resource: "attribute" operation: "delete" };
  }

  rpc ListConditions(ListConditionsRequest) returns (ListConditionsResponse) {
    option (google.api.http) = { get: "/api/iam/v1/conditions" };
    option (plantx.kit.authz.action) = { service: "iam" resource: "condition" operation: "list" };
  }
  rpc CreateCondition(CreateConditionRequest) returns (Condition) {
    option (google.api.http) = { post: "/api/iam/v1/conditions" body: "*" };
    option (plantx.kit.authz.action) = { service: "iam" resource: "condition" operation: "create" };
  }
  rpc UpdateCondition(UpdateConditionRequest) returns (Condition) {
    option (google.api.http) = { put: "/api/iam/v1/conditions/{id}" body: "*" };
    option (plantx.kit.authz.action) = { service: "iam" resource: "condition" operation: "update" };
  }
  rpc DeleteCondition(DeleteConditionRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/api/iam/v1/conditions/{id}" };
    option (plantx.kit.authz.action) = { service: "iam" resource: "condition" operation: "delete" };
  }

  rpc ListPolicies(ListPoliciesRequest) returns (ListPoliciesResponse) {
    option (google.api.http) = { get: "/api/iam/v1/policies" };
    option (plantx.kit.authz.action) = { service: "iam" resource: "policy" operation: "list" };
  }
  rpc CreatePolicy(CreatePolicyRequest) returns (Policy) {
    option (google.api.http) = { post: "/api/iam/v1/policies" body: "*" };
    option (plantx.kit.authz.action) = { service: "iam" resource: "policy" operation: "create" };
  }
  rpc UpdatePolicy(UpdatePolicyRequest) returns (Policy) {
    option (google.api.http) = { put: "/api/iam/v1/policies/{id}" body: "*" };
    option (plantx.kit.authz.action) = { service: "iam" resource: "policy" operation: "update" };
  }
  rpc DeletePolicy(DeletePolicyRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/api/iam/v1/policies/{id}" };
    option (plantx.kit.authz.action) = { service: "iam" resource: "policy" operation: "delete" };
  }

  rpc EvaluatePolicy(EvaluatePolicyRequest) returns (EvaluatePolicyResponse) {
    option (google.api.http) = { post: "/api/iam/v1/policies/evaluate" body: "*" };
    option (plantx.kit.authz.action) = { service: "iam" resource: "policy" operation: "read" };
  }
}

message User {
  string id = 1;
  string username = 2;
  string tenant_id = 3;
  repeated string role_ids = 4;
}

message Role {
  string id = 1;
  string name = 2;
  repeated string permissions = 3;
  string description = 4;
}

message Permission {
  string id = 1;
  string name = 2;
  string resource = 3;
  string operation = 4;
  string description = 5;
}

message ListUsersRequest {}

message ListUsersResponse {
  repeated User users = 1;
}

message CreateUserRequest {
  string username = 1;
  string tenant_id = 2;
  repeated string role_ids = 3;
}

message ListRolesRequest {}

message ListRolesResponse {
  repeated Role roles = 1;
}

message GetRoleRequest {
  string id = 1;
}

message CreateRoleRequest {
  string name = 1;
  repeated string permissions = 2;
  string description = 3;
}

message UpdateRoleRequest {
  string id = 1;
  string name = 2;
  repeated string permissions = 3;
  string description = 4;
}

message DeleteRoleRequest {
  string id = 1;
}

message ListPermissionsRequest {}

message ListPermissionsResponse {
  repeated Permission permissions = 1;
}

message CreatePermissionRequest {
  string name = 1;
  string resource = 2;
  string operation = 3;
  string description = 4;
}

message DeletePermissionRequest {
  string id = 1;
}

message Attribute {
  string id = 1;
  string key = 2;
  string value_type = 3;
  string description = 4;
}

message Condition {
  string id = 1;
  string name = 2;
  string attribute_key = 3;
  string operator = 4;
  string value = 5;
  string description = 6;
}

message Policy {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated string permissions = 4;
  repeated string condition_ids = 5;
  string effect = 6;
  int32 priority = 7;
}

message ListAttributesRequest {}
message ListAttributesResponse { repeated Attribute attributes = 1; }
message CreateAttributeRequest {
  string key = 1;
  string value_type = 2;
  string description = 3;
}
message UpdateAttributeRequest {
  string id = 1;
  string key = 2;
  string value_type = 3;
  string description = 4;
}
message DeleteAttributeRequest { string id = 1; }

message ListConditionsRequest {}
message ListConditionsResponse { repeated Condition conditions = 1; }
message CreateConditionRequest {
  string name = 1;
  string attribute_key = 2;
  string operator = 3;
  string value = 4;
  string description = 5;
}
message UpdateConditionRequest {
  string id = 1;
  string name = 2;
  string attribute_key = 3;
  string operator = 4;
  string value = 5;
  string description = 6;
}
message DeleteConditionRequest { string id = 1; }

message ListPoliciesRequest {}
message ListPoliciesResponse { repeated Policy policies = 1; }
message CreatePolicyRequest {
  string name = 1;
  string description = 2;
  repeated string permissions = 3;
  repeated string condition_ids = 4;
  string effect = 5;
  int32 priority = 6;
}
message UpdatePolicyRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated string permissions = 4;
  repeated string condition_ids = 5;
  string effect = 6;
  int32 priority = 7;
}
message DeletePolicyRequest { string id = 1; }

message EvaluatePolicyRequest {
  string permission = 1;
  map<string, string> user_attributes = 2;
  map<string, string> resource_attributes = 3;
}
message EvaluatePolicyResponse {
  bool allowed = 1;
  string reason = 2;
}
