name: Generate SDK

on:
  push:
    branches: [main]
    paths:
      - 'proto/**'
      - 'platform/**/migrations/**'
      - 'scripts/generate.sh'
      - '.github/workflows/generate-sdk.yml'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install protoc and sqlc
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          curl -L -o /tmp/sqlc.tar.gz https://github.com/sqlc-dev/sqlc/releases/download/v1.26.0/sqlc_1.26.0_linux_amd64.tar.gz
          tar -xzf /tmp/sqlc.tar.gz -C /tmp
          sudo mv /tmp/sqlc /usr/local/bin/sqlc
          chmod +x /usr/local/bin/sqlc

      - run: pnpm install --frozen-lockfile

      - name: Run generators
        run: bash scripts/generate.sh

      - name: Create Pull Request with generated SDK
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: regenerate sdk'
          title: 'chore: regenerate sdk'
          body: |
            Generated SDK and migration code changed after the latest proto/migration update.
            Please review and merge to keep generated artifacts in sync.
          branch: chore/regenerate-sdk
          delete-branch: true
