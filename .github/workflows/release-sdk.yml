name: Release SDK

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          # We need the full history so we can commit the version bump back to main.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build kit SDK packages
        run: pnpm -r --filter './kit/**' run build

      - name: Bump kit package versions from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Bumping kit packages to version $VERSION"
          pnpm -r --filter './kit/**' exec npm version "$VERSION" --no-git-tag-version

      - name: Publish kit packages to npm
        run: pnpm ci:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag Go modules
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for module in kit/kit-go kit/kit-go/gateway kit/kit-cli; do
            tag="${module}/v${VERSION}"
            if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "Tag $tag already exists, skipping"
            else
              git tag "$tag"
              git push origin "$tag"
              echo "Created and pushed $tag"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kit/**/package.json
          git commit -m "chore(release): bump kit packages to ${{ github.ref_name }}" || true
          git push origin HEAD:main || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
