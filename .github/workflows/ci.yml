name: CI

on:
  push:
    branches: [main, release/*]
    tags: ['v*']
  pull_request:
    branches: [main, release/*]

jobs:
  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./kit/... ./services/order/... ./kit/kit-cli/...

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json

  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm typecheck

  build-images:
    runs-on: ubuntu-latest
    needs: [lint-go, test-go, lint-web]
    steps:
      - uses: actions/checkout@v4
      - name: Build service images
        run: |
          docker build -t plantx/order-service:${{ github.sha }} ./services/order

  publish-images:
    runs-on: ubuntu-latest
    needs: [build-images]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          docker build -t ghcr.io/plantx/order-service:${VERSION} -t ghcr.io/plantx/order-service:latest ./services/order
          docker push ghcr.io/plantx/order-service:${VERSION}
          docker push ghcr.io/plantx/order-service:latest
