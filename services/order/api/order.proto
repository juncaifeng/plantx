syntax = "proto3";

package plantx.order.v1;

option go_package = "github.com/plantx/services/order/api";

import "google/api/annotations.proto";
import "plantx/kit/authz.proto";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (Order) {
    option (google.api.http) = {
      post: "/api/order/v1/orders"
      body: "*"
    };
    option (plantx.kit.authz.action) = {
      service: "order"
      resource: "order"
      operation: "create"
    };
  }

  rpc GetOrder(GetOrderRequest) returns (Order) {
    option (google.api.http) = {
      get: "/api/order/v1/orders/{id}"
    };
    option (plantx.kit.authz.action) = {
      service: "order"
      resource: "order"
      operation: "read"
    };
  }

  rpc ListOrders(ListOrdersRequest) returns (OrderList) {
    option (google.api.http) = {
      get: "/api/order/v1/orders"
    };
    option (plantx.kit.authz.action) = {
      service: "order"
      resource: "order"
      operation: "list"
    };
  }
}

message Order {
  string id = 1;
  string tenant_id = 2;
  string customer_name = 3;
  string status = 4;
  int64 created_at = 5;
}

message CreateOrderRequest {
  string customer_name = 1;
}

message GetOrderRequest {
  string id = 1;
}

message ListOrdersRequest {
  string status = 1;
}

message OrderList {
  repeated Order orders = 1;
}
