version: "2"
sql:
  - schema: "migrations"
    queries: "internal/infra/sqlc"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "internal/infra/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
